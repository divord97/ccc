global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ccc-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]
        labels:
          service: "ccc-api"

  - job_name: "freeswitch"
    metrics_path: /metrics
    static_configs:
      - targets: ["freeswitch:8088"]
        labels:
          service: "freeswitch"
    scrape_interval: 30s

  - job_name: "mysql-exporter"
    static_configs:
      - targets: ["mysql-exporter:9104"]
        labels:
          service: "mysql"
    scrape_interval: 30s

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"
    scrape_interval: 30s
